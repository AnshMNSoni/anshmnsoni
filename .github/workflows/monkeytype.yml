name: generate monkeytype readme svg

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  download-svg:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download SVGs
        run: |
          mkdir monkeytype-readme-svg

          curl -o monkeytype-readme-svg/monkeytype.svg https://monkeytype-readme.zeabur.app/generate-svg/anshmnsoni/botanical

          curl -o monkeytype-readme-svg/monkeytype-lb.svg https://monkeytype-readme.zeabur.app/generate-svg/anshmnsoni/botanical?lb=true

          curl -o monkeytype-readme-svg/monkeytype-pb.svg https://monkeytype-readme.zeabur.app/generate-svg/anshmnsoni/botanical?pb=true

      - name: Deploy to branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: monkeytype-readme
          build_dir: monkeytype-readme-svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}